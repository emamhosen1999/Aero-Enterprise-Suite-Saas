# Training Configuration for Aero Assistant

base_model:
  name: "meta-llama/Llama-2-7b-chat-hf"
  cache_dir: "./cache"

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 100
  max_seq_length: 2048
  weight_decay: 0.01
  max_grad_norm: 1.0

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: "none"

quantization:
  load_in_8bit: false
  load_in_4bit: false

optimization:
  gradient_checkpointing: true
  use_flash_attention: false
  fp16: true
  bf16: false

output:
  checkpoint_dir: "./checkpoints"
  final_model_dir: "./models"
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  save_total_limit: 3

data:
  train_file: "data/processed/instruction_dataset.jsonl"
  test_file: "data/processed/test_instruction_dataset.jsonl"
  max_samples: null  # null = use all

logging:
  tensorboard: true
  wandb: false
  log_dir: "./logs"

distributed:
  enabled: false
  world_size: 1
  backend: "nccl"
